<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký thành viên</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background-color: #fff;
        width: 600px;
        padding: 30px 40px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        color: #0d6b38;
        margin-bottom: 25px;
        font-size: 26px;
      }

      .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
      }

      label {
        margin-bottom: 5px;
        color: #333;
        font-size: 15px;
      }

      input[type="text"],
      input[type="password"],
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        outline: none;
      }

      input[type="text"]:focus,
      input[type="password"]:focus,
      textarea:focus {
        border-color: #0d6b38;
      }

      textarea {
        resize: vertical;
      }

      .helper-text {
        font-size: 13px;
        color: #888;
        font-style: italic;
        margin-top: 5px;
      }

      .error-msg {
        color: red;
        font-size: 13px;
        margin-top: 5px;
        display: block;
      }

      .radio-group,
      .checkbox-group {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .radio-group input,
      .checkbox-group input {
        margin-right: 5px;
      }

      .radio-group label,
      .checkbox-group label {
        margin-bottom: 0;
        font-weight: normal;
      }

      .btn-submit {
        display: block;
        width: 120px;
        padding: 12px;
        margin: 25px auto 0;
        background-color: #0d6b38;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        text-align: center;
      }

      .btn-submit:hover {
        background-color: #0a522a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>ĐĂNG KÝ THÀNH VIÊN</h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" id="fullname" placeholder="Nhập họ và tên" />
          <span class="error-msg" id="fullnameError"></span>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="text" id="email" placeholder="Nhập email" />
          <span class="helper-text"
            >Ví dụ: exam@gmail.com hoặc exam@gmail.com.vn /
            exam@gmail.info</span
          >
          <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" id="phone" placeholder="Nhập số điện thoại" />
          <span class="helper-text">Ví dụ: 0912112112 hoặc +84999999999</span>
          <span class="error-msg" id="phoneError"></span>
        </div>

        <div class="form-group">
          <label>Giới tính</label>
          <div class="radio-group">
            <input type="radio" name="gender" id="male" checked />
            <label for="male">Nam</label>
            <input type="radio" name="gender" id="female" />
            <label for="female">Nữ</label>
            <input type="radio" name="gender" id="other" />
            <label for="other">Khác</label>
          </div>
        </div>

        <div class="form-group">
          <label>Sở thích</label>
          <div class="checkbox-group">
            <input type="checkbox" id="football" />
            <label for="football">Bóng đá</label>
            <input type="checkbox" id="music" />
            <label for="music">Âm nhạc</label>
            <input type="checkbox" id="travel" />
            <label for="travel">Du lịch</label>
            <input type="checkbox" id="reading" />
            <label for="reading">Đọc sách</label>
          </div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu" />
          <span class="error-msg" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Nhập lại mật khẩu"
          />
          <span class="error-msg" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
          <label>Địa chỉ</label>
          <textarea id="address" rows="3" placeholder="Nhập địa chỉ"></textarea>
          <span class="error-msg" id="addressError"></span>
        </div>

        <button type="submit" class="btn-submit">Đăng ký</button>
      </form>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          let isValid = true;

          const fullname = document.getElementById("fullname").value.trim();
          const email = document.getElementById("email").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const password = document.getElementById("password").value.trim();
          const confirmPassword = document
            .getElementById("confirmPassword")
            .value.trim();
          const address = document.getElementById("address").value.trim();

          document.getElementById("fullnameError").textContent = "";
          document.getElementById("emailError").textContent = "";
          document.getElementById("phoneError").textContent = "";
          document.getElementById("passwordError").textContent = "";
          document.getElementById("confirmPasswordError").textContent = "";
          document.getElementById("addressError").textContent = "";

          if (fullname === "") {
            document.getElementById("fullnameError").textContent =
              "Họ tên không được để trống";
            isValid = false;
          }

          if (email === "") {
            document.getElementById("emailError").textContent =
              "Email không được để trống";
            isValid = false;
          }

          if (phone === "") {
            document.getElementById("phoneError").textContent =
              "Số điện thoại không được để trống";
            isValid = false;
          }

          if (password === "") {
            document.getElementById("passwordError").textContent =
              "Mật khẩu không được để trống";
            isValid = false;
          }

          if (confirmPassword === "") {
            document.getElementById("confirmPasswordError").textContent =
              "Vui lòng nhập lại mật khẩu";
            isValid = false;
          }

          if (address === "") {
            document.getElementById("addressError").textContent =
              "Địa chỉ không được để trống";
            isValid = false;
          }

          if (isValid) {
            alert("Dữ liệu hợp lệ. Tiến hành đăng ký!");
          }
        });
    </script>
  </body>
</html>
