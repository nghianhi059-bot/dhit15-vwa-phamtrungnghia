<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thao tác CSS với DOM</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      h1 {
        text-align: center;
      }

      section {
        margin: 1rem auto;
        padding: 1rem;
        width: 500px;
        border: 1px solid green;
        border-radius: 10px;
      }

      div {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      button {
        display: block;
        padding: 1rem 2rem;
        cursor: pointer;
      }

      .active {
        background-color: yellow;
        color: green;
        font-size: 2rem;
      }

      .toggle {
        background-color: red;
        color: #fff;
        border: none;
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>Thao tác CSS với DOM</h1>
      <div>
        <button onclick="changeStyle()">style</button>
        <button onclick="addClass()" id="btnAddClass">classList.add()</button>
        <button onclick="removeClass()">classList.remove()</button>
        <button onclick="toggleClass()" id="btnToggle">
          classList.toggle()
        </button>
      </div>
    </section>

    <script>
      const changeStyle = () => {
        document.querySelector("section").style.backgroundColor = "green";
        document.querySelector("section").style.color = "yellow";
      };

      const addClass = () => {
        document.getElementById("btnAddClass").classList.add("active");
      };

      const removeClass = () => {
        document.getElementById("btnAddClass").classList.remove("active");
      };

      const toggleClass = () => {
        document.getElementById("btnToggle").classList.toggle("toggle");
      };
    </script>
  </body>
</html>
