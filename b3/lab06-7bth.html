<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BT7</title>
  </head>

  <body>
    <h1>Switch Case - Hiển thị thứ trong tuần</h1>
    <hr />
    <script>
      var day = 3;
      switch (day) {
        case 1:
          document.write("Thứ hai");
          break;
        case 2:
          document.write("Thứ ba");
          break;
        case 3:
          document.write("Thứ tư");
          break;
        default:
          document.write("Không hợp lệ");
      }
    </script>
  </body>
</html>
