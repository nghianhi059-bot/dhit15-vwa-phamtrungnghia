<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BT11</title>
  </head>
  <body>
    <h1>Mảng trong JavaScript</h1>
    <script>
      var students = ["Hieu", "Cam", "Phuong", "Nghia"];

      document.write(students[0] + "<br>");
      document.write(students[1] + "<br>");
      document.write("<hr/>");
      for (var i = 0; i < students.length; i++) {
        document.write(students[i] + "<br>");
      }
      students.sort();
      document.write("<hr/> Sau khi sắp xếp: <br>");
      for (var i = 0; i < students.length; i++) {
        document.write(students[i] + "<br>");
      }
    </script>
  </body>
</html>
